{% extends "base.html" %}
{% block title %}New Message{% endblock %}
{% block content %}
<div class="mb-4">
  <h4 style="color:#133957;font-weight:700;margin:0;">New Message</h4>
</div>
<div class="card p-4" style="max-width:700px;">
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-semibold" style="font-size:12px;">TO (User)</label>
      <select name="recipient" class="form-select form-select-sm">
        <option value="">Select a user...</option>
        {% for u in users %}
        <option value="{{ u.pk }}">{{ u.get_full_name }} ({{ u.username }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold" style="font-size:12px;">OR TEAM</label>
      <select name="recipient_team" class="form-select form-select-sm">
        <option value="">Select a team...</option>
        {% for t in teams %}
        <option value="{{ t.pk }}">{{ t.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold" style="font-size:12px;">SUBJECT</label>
      <input type="text" name="subject" class="form-control form-control-sm" placeholder="Enter subject" required>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold" style="font-size:12px;">MESSAGE</label>
      <textarea name="body" class="form-control" rows="8" placeholder="Type your message here..." required></textarea>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" name="action" value="send" class="btn btn-primary">
        <i class="bi bi-send"></i> Send Message
      </button>
      <button type="submit" name="action" value="draft" class="btn btn-outline-secondary">
        <i class="bi bi-save"></i> Save as Draft
      </button>
      <a href="{% url 'messaging:inbox' %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
