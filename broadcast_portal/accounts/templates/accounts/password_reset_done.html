{% extends "base.html" %}
{% block auth_content %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Email Sent</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { margin:0; background:#133957; min-height:100vh;
           display:flex; align-items:center; justify-content:center; }
    .box { background:white; border-radius:12px; padding:48px; max-width:440px; text-align:center; }
  </style>
</head>
<body>
<div class="box">
  <div style="font-size:48px;margin-bottom:16px;">📧</div>
  <h3 style="font-weight:700;color:#133957;">Check Your Email</h3>
  <p style="color:#666;font-size:14px;margin:16px 0 24px;">
    If an account with that email exists, we've sent password reset instructions.
    Check your inbox (and spam folder).
  </p>
  <a href="{% url 'accounts:login' %}"
     style="background:#133957;color:white;padding:12px 32px;border-radius:8px;
            text-decoration:none;font-weight:600;font-size:14px;">
    Back to Login
  </a>
</div>
</body>
</html>
{% endblock %}
