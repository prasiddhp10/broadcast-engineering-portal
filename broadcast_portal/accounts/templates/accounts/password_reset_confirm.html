{% extends "base.html" %}
{% block auth_content %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Set New Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { margin:0; background:#133957; min-height:100vh;
           display:flex; align-items:center; justify-content:center; }
    .box { background:white; border-radius:12px; padding:48px; max-width:440px; width:100%; }
    .form-label { font-size:11px; text-transform:uppercase; color:#555; font-weight:600; }
    .form-control { border-radius:8px; border:1px solid #ddd; padding:10px 14px; font-size:14px; }
    .btn-submit { background:#133957; color:white; width:100%; padding:12px;
                  border:none; border-radius:8px; font-weight:600; font-size:14px; }
  </style>
</head>
<body>
<div class="box">
  <h3 style="font-weight:700;color:#133957;margin-bottom:24px;">Set New Password</h3>
  {% if validlink %}
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">New Password</label>
      <input type="password" name="new_password1" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Confirm New Password</label>
      <input type="password" name="new_password2" class="form-control" required>
    </div>
    {% if form.errors %}
    <div class="alert alert-danger" style="font-size:12px;">{{ form.errors }}</div>
    {% endif %}
    <button type="submit" class="btn btn-submit">Set Password</button>
  </form>
  {% else %}
  <div class="alert alert-danger">This reset link is invalid or has expired.</div>
  <a href="{% url 'accounts:password_reset' %}">Request a new one</a>
  {% endif %}
</div>
</body>
</html>
{% endblock %}
